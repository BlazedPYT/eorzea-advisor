name: Build & Publish Desktop App

# Publishes a new release whenever you push a version tag, e.g.:
#   git tag v1.2.1 && git push origin v1.2.1
# GitHub builds the Windows installer and publishes it — no local token needed.
# Auto-update then delivers it to everyone running the app.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # allow the workflow to create/publish GitHub Releases

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Verify tag matches package.json version
        shell: bash
        run: |
          PKG=$(node -p "require('./package.json').version")
          TAG="${GITHUB_REF_NAME#v}"
          echo "package.json: $PKG   tag: $TAG"
          if [ "$PKG" != "$TAG" ]; then
            echo "::error::Tag v$TAG does not match package.json version $PKG. Bump the version, commit, then tag the same number."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js standalone bundle
        run: npm run desktop:assemble

      - name: Build & publish installer (electron-builder)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --publish always

      - name: Publish the release (flip draft → live, mark latest)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: gh release edit "${GITHUB_REF_NAME}" --draft=false --latest --repo "${GITHUB_REPOSITORY}"
