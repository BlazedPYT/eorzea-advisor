<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b9a3f0"/>
      <stop offset="55%" stop-color="#8b66e0"/>
      <stop offset="100%" stop-color="#6a8cf0"/>
    </linearGradient>
    <radialGradient id="body" cx="50%" cy="36%" r="70%">
      <stop offset="0%" stop-color="#fbf9ff"/>
      <stop offset="100%" stop-color="#d3c6f6"/>
    </radialGradient>
    <radialGradient id="pom" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#fff3c9"/>
      <stop offset="100%" stop-color="#eec45c"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#3a2f6b" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- rounded-square backdrop -->
  <rect x="26" y="26" width="460" height="460" rx="116" fill="url(#bg)"/>
  <rect x="26" y="26" width="460" height="460" rx="116" fill="none" stroke="#ffffff" stroke-opacity="0.25" stroke-width="6"/>

  <!-- antenna + pom-pom -->
  <path d="M256 150 C 256 96, 286 78, 312 64" stroke="#ffffff" stroke-opacity="0.9" stroke-width="14" stroke-linecap="round" fill="none"/>
  <circle cx="320" cy="58" r="34" fill="url(#pom)" filter="url(#soft)"/>

  <!-- ears -->
  <ellipse cx="132" cy="252" rx="40" ry="58" fill="#c4b5f0" transform="rotate(-18 132 252)"/>
  <ellipse cx="380" cy="252" rx="40" ry="58" fill="#c4b5f0" transform="rotate(18 380 252)"/>

  <!-- body -->
  <ellipse cx="256" cy="300" rx="160" ry="150" fill="url(#body)" filter="url(#soft)"/>

  <!-- cheeks -->
  <circle cx="180" cy="330" r="26" fill="#f7c6d9" opacity="0.75"/>
  <circle cx="332" cy="330" r="26" fill="#f7c6d9" opacity="0.75"/>

  <!-- eyes -->
  <circle cx="206" cy="290" r="27" fill="#3a3357"/>
  <circle cx="306" cy="290" r="27" fill="#3a3357"/>
  <circle cx="215" cy="280" r="9" fill="#ffffff"/>
  <circle cx="315" cy="280" r="9" fill="#ffffff"/>

  <!-- smile -->
  <path d="M222 346 Q 256 380 290 346" stroke="#3a3357" stroke-width="13" stroke-linecap="round" fill="none"/>
</svg>
